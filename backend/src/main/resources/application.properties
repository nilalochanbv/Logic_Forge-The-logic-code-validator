# Server configuration
server.port=5000

# Spring configuration
spring.main.allow-bean-definition-overriding=true

# Spring Data MongoDB Configuration (will fall back to JSON if URI is empty or database is unreachable)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/logicforge}

# Jackson JSON serialization configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
